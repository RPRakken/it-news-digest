name: Weekly IT News Digest

on:
  schedule:
    # Every Sunday at 08:00 UTC
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force news collection (leave blank for normal run)'
        required: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect news
        run: python collect_news.py

      - name: Commit and push
        run: |
          git config user.name  "News Bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html weeks.json "week-$(python3 -c 'from datetime import datetime; d=datetime.utcnow(); print(f\"{d.isocalendar()[0]}-W{d.isocalendar()[1]:02d}\")'  ).html" || true
          git add week-*.html || true
          git diff --staged --quiet || git commit -m "Weekly news update — $(python3 -c 'from datetime import datetime; d=datetime.utcnow(); print(f\"{d.isocalendar()[0]}-W{d.isocalendar()[1]:02d}\")')"
          git push
